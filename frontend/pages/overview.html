<!-- ============================================================
     RENDERING ENGINE
     Pure functions. No DOM state. Reads only from CHART_DATA.
     To update the display: update CHART_DATA, call renderAll().
     ============================================================ -->
<script>
// ── Geometry helpers ─────────────────────────────────────────
// Convert a data value to a 0-100 SVG y-coordinate (top = 0).
function toY(val, yMin, yMax) {
  return (1 - (val - yMin) / (yMax - yMin)) * 100;
}

// Build an SVG <polyline> points string from parallel arrays.
// xArr: x positions (0-100), yArr: y positions (0-100)
function polyPts(xArr, yArr) {
  return xArr.map((x, i) => `${x.toFixed(2)},${yArr[i].toFixed(2)}`).join(' ');
}

// Build a closed polygon string for the area fill under a line.
// Closes back along y=100 (bottom of chart).
function fillPts(xArr, yArr) {
  return polyPts(xArr, yArr) +
    ` ${xArr[xArr.length-1].toFixed(2)},100 ${xArr[0].toFixed(2)},100`;
}

// ── X-position calculators ───────────────────────────────────
// LINE chart: first point at x=0, last at x=100 (touches both axis edges)
function lineXPositions(n) {
  return Array.from({length: n}, (_, i) => (n === 1) ? 50 : (i / (n - 1)) * 100);
}

// BAR chart: bars centered in equal columns, each column = 100/n units wide
function barXCenters(n) {
  return Array.from({length: n}, (_, i) => (i + 0.5) / n * 100);
}

// ── SVG builders ─────────────────────────────────────────────
// Both builders follow the same z-order:
//   gridlines → axis rules → week separator → data (bars/fill/line) →
//   x-axis rule → REFERENCE LINES (on top) → tick marks
// Reference lines are last so they always pop above the data.

function buildBarSVG(chartKey, uid) {
  const c = CHART_DATA.charts[chartKey];
  const n = c.values.length;
  const xs = barXCenters(n);
  const bw = (100 / n) * 0.85; // bar width = 85% of column width

  // Compute SVG y-positions
  const goalY = toY(c.goalVal, c.yMin, c.yMax).toFixed(2);
  const refVal = currentMode === 'median' ? c.medianVal : c.meanVal;
  const meanY = toY(refVal, c.yMin, c.yMax).toFixed(2);

  // Grid lines at 0%, 20%, 40%, 60%, 80%, 100% of chart height
  const grids = [0,20,40,60,80,100].map(v =>
    `<line x1="0" y1="${v}" x2="100" y2="${v}" stroke="#CBD5E1" stroke-width="0.4" opacity="0.4"/>`
  ).join('');

  // Axis rules
  const yrule = `<line x1="0" y1="0" x2="0" y2="100" stroke="#CBD5E1" stroke-width="0.5"/>`;
  const xrule = `<line x1="0" y1="100" x2="100" y2="100" stroke="#CBD5E1" stroke-width="0.5"/>`;

  // Clip so bars/lines never bleed outside chart area
  const clip = `<clipPath id="c${uid}"><rect x="0" y="0" width="100" height="100"/></clipPath>`;

  // Bars (clipped)
  const bars = c.values.map((val, i) => {
    const by = toY(val, c.yMin, c.yMax).toFixed(2);
    const bh = (100 - parseFloat(by)).toFixed(2);
    const bx = (xs[i] - bw/2).toFixed(2);
    return `<rect x="${bx}" y="${by}" width="${bw.toFixed(2)}" height="${bh}" fill="#2563EB" opacity="0.85" clip-path="url(#c${uid})"/>`;
  }).join('');

  // Reference lines — drawn AFTER bars so they appear on top
  const goalLine = `<line x1="0" y1="${goalY}" x2="100" y2="${goalY}" stroke="#B91C1C" stroke-width="1.2" stroke-dasharray="2.5,1.5" clip-path="url(#c${uid})"/>`;
  const meanLine = `<line x1="0" y1="${meanY}" x2="100" y2="${meanY}" stroke="#D97706" stroke-width="1.4" opacity="0.95" clip-path="url(#c${uid})"/>`;

  // Tick marks at each bar center, below x-axis
  const ticks = xs.map(x =>
    `<line x1="${x.toFixed(2)}" y1="100" x2="${x.toFixed(2)}" y2="104" stroke="#94A3B8" stroke-width="0.5"/>`
  ).join('');

  // viewBox height 106 = 100 chart + 6 tick overhang
  return `<svg width="100%" height="160" viewBox="0 0 100 106" preserveAspectRatio="none" style="display:block;">
    <defs>${clip}</defs>
    ${grids}${yrule}${bars}${xrule}${goalLine}${meanLine}${ticks}
  </svg>`;
}

function buildLineSVG(chartKey, uid) {
  const c = CHART_DATA.charts[chartKey];
  const n = c.values.length;
  const xs = lineXPositions(n);          // 0 … 100, touches both edges
  const ys = c.values.map(v => toY(v, c.yMin, c.yMax));

  const goalY = toY(c.goalVal, c.yMin, c.yMax).toFixed(2);
  const refVal = currentMode === 'median' ? c.medianVal : c.meanVal;
  const meanY = toY(refVal, c.yMin, c.yMax).toFixed(2);

  const grids = [0,20,40,60,80,100].map(v =>
    `<line x1="0" y1="${v}" x2="100" y2="${v}" stroke="#CBD5E1" stroke-width="0.4" opacity="0.45"/>`
  ).join('');

  const yrule = `<line x1="0" y1="0" x2="0" y2="100" stroke="#CBD5E1" stroke-width="0.5"/>`;
  const xrule = `<line x1="0" y1="100" x2="100" y2="100" stroke="#CBD5E1" stroke-width="0.5"/>`;

  // Subtle week-boundary separator at x=50 (midpoint between day 5 and day 6)
  const wkSep = `<line x1="50" y1="0" x2="50" y2="100" stroke="#CBD5E1" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.5"/>`;

  const clip = `<clipPath id="c${uid}"><rect x="0" y="0" width="100" height="100"/></clipPath>`;
  const grad = `<linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#2563EB" stop-opacity="0.20"/>
    <stop offset="80%"  stop-color="#2563EB" stop-opacity="0.03"/>
    <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
  </linearGradient>`;

  // Blue fill polygon (gradient) then blue line — both clipped
  const fill = `<polygon points="${fillPts(xs, ys)}" fill="url(#g${uid})" clip-path="url(#c${uid})"/>`;
  const line = `<polyline points="${polyPts(xs, ys)}" fill="none" stroke="#2563EB" stroke-width="1.0" stroke-linejoin="round" stroke-linecap="round" clip-path="url(#c${uid})"/>`;

  // Reference lines — drawn AFTER fill+line so they appear on top
  const goalLine = `<line x1="0" y1="${goalY}" x2="100" y2="${goalY}" stroke="#B91C1C" stroke-width="1.2" stroke-dasharray="2.5,1.5" clip-path="url(#c${uid})"/>`;
  const meanLine = `<line x1="0" y1="${meanY}" x2="100" y2="${meanY}" stroke="#D97706" stroke-width="1.4" opacity="0.95" clip-path="url(#c${uid})"/>`;

  // Tick marks at exact data-point x-positions (same xs array as data)
  const ticks = xs.map(x =>
    `<line x1="${x.toFixed(2)}" y1="100" x2="${x.toFixed(2)}" y2="104" stroke="#94A3B8" stroke-width="0.5"/>`
  ).join('');

  return `<svg width="100%" height="160" viewBox="0 0 100 106" preserveAspectRatio="none" style="display:block;">
    <defs>${grad}${clip}</defs>
    ${grids}${yrule}${wkSep}${fill}${line}${xrule}${goalLine}${meanLine}${ticks}
  </svg>`;
}

// ── Y-axis label column ──────────────────────────────────────
// Labels are HTML spans (not SVG text) so they never stretch
// with preserveAspectRatio="none".
// yTicks array: top label first (highest value → y=0%).
function buildYAxis(chartKey) {
  const ticks = CHART_DATA.charts[chartKey].yTicks;
  const n = ticks.length;
  const spans = ticks.map((label, i) => {
    const topPct = (i / (n - 1)) * 100;
    return `<span style="top:${topPct.toFixed(1)}%">${label}</span>`;
  }).join('');
  return `<div class="y-col">${spans}</div>`;
}

// ── Chart panel ──────────────────────────────────────────────
function buildChart(chartKey, uid, chartType) {
  const c = CHART_DATA.charts[chartKey];
  const svg = chartType === 'bar' ? buildBarSVG(chartKey, uid) : buildLineSVG(chartKey, uid);
  const goalLabel = chartType === 'bar'
    ? `${c.goalVal} (dotted red)`
    : `${c.goalVal} (red dotted)`;
  return `
    <div class="cp">
      <div class="cp-title">${c.label} &middot; Daily mean &middot; 2 weeks</div>
      <div class="cp-sub">March 1&ndash;14 &middot; Goal: ${goalLabel} &middot; Mean: ${c.meanVal} (gold)</div>
      <div style="display:flex;align-items:flex-start;gap:0;">
        ${buildYAxis(chartKey)}
        <div style="flex:1;min-width:0;">
          ${svg}
          <div class="chart-date">
            ${CHART_DATA.period.from.replace(', 2026','')}&nbsp;&ndash;&nbsp;${CHART_DATA.period.to}
          </div>
        </div>
      </div>
    </div>`;
}

}

// ── Mean / Median toggle ─────────────────────────────────────
// Called by mm-btn onclick. Updates currentMode state and
// re-renders all charts by calling renderApp on each container.
function setMM(mode) {
  if (currentMode === mode) return;
  currentMode = mode;
  // Re-render both chart panels (bar + line)
  renderApp('app-bar',  'bar');
  renderApp('app-line', 'line');
  // Update toggle button active state
  document.querySelectorAll('.mm-btn').forEach(btn => {
    btn.classList.toggle('on', btn.dataset.mode === mode);
  });
  // Refresh stat cards
  const cardMount = document.querySelector('.sc-row');
  if (cardMount) cardMount.outerHTML = buildCards();

  // Update legend label
  document.querySelectorAll('.leg-label.gold').forEach(el => {
    el.textContent = mode === 'mean' ? 'Period mean' : 'Period median';
  });
}

// ── Summary stat cards ───────────────────────────────────────
function buildCards() {
  return `<div class="sc-row">${
    CHART_DATA.summary.map(s => {
      // Switch all card values based on currentMode
      const isMedian  = currentMode === 'median';
      const label     = isMedian ? s.medianLabel : s.label;
      const value     = isMedian ? s.medianValue : s.value;
      const trend     = isMedian ? s.medianTrend : s.trend;
      const goalMet   = isMedian ? s.medianGoalMet : s.goalMet;
      const goalClass = goalMet ? 'hit' : 'miss';
      const goalIcon  = goalMet ? '&#10003;' : '&#10007;';
      const indClass  = s.trendDir === 'up' ? 'si-up' : 'si-dn';
      const indIcon   = s.trendDir === 'up' ? '&#8593;' : '&#8595;';
      const cardClass = goalMet ? 'above' : 'below';
      return `
        <div class="sc ${cardClass}">
          <div class="sc-lbl">${label}</div>
          <div class="sc-vrow">
            <div class="sc-val">${value}</div>
            <span class="sc-ind ${indClass}">${indIcon} ${trend}</span>
          </div>
          <div class="sc-note">vs prior 2w: ${s.prior || '&mdash;'}</div>
          <div class="sc-goal ${goalClass}">${goalIcon} ${goalMet ? 'Above' : 'Below'} goal (${s.goal})</div>
        </div>`;
    }).join('')
  }</div>`;
}

// ── Main render function ─────────────────────────────────────
// Called once on load. Call again after updating CHART_DATA
// (e.g. after a fetch() returns new period data from the DB).
// ── State ────────────────────────────────────────────────────
let currentMode = 'mean'; // 'mean' | 'median'

function renderApp(containerId, chartType) {
  const el = document.getElementById(containerId);
  if (!el) return;

  const charts = Object.keys(CHART_DATA.charts);   // ['sp_pct','cust','sp_d','sp_n']
  const [k0, k1, k2, k3] = charts;

  el.innerHTML = `
    <div class="shell">
      ${SIDEBAR}
      <div class="an-shell">
        ${buildSubnav(chartType)}
        <div class="main">
          ${buildTopbar(chartType)}
          <div class="content">
            ${buildCtx()}
            ${buildLegend(chartType)}
            ${buildCards()}
            <div class="chart-grid-2">
              ${buildChart(k0, chartType + k0, chartType)}
              ${buildChart(k1, chartType + k1, chartType)}
            </div>
            <div class="chart-grid-2">
              ${buildChart(k2, chartType + k2, chartType)}
              ${buildChart(k3, chartType + k3, chartType)}
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

// ── Boot ─────────────────────────────────────────────────────
function renderAll() {

  renderApp('app-line', 'line');
}

renderAll();

// ── Period change handler (called by page-wiring.js) ─────────
// Fetches data from DB for the selected period, builds CHART_DATA, re-renders.
window.setPeriod = async function(periodCode, anchorDate) {
  if (!window.GS_BRIDGE || !window.GS_BRIDGE.isTauri) return;

  const data = await window.GS_BRIDGE.loadRecordsForPeriod(periodCode, anchorDate);
  if (data.isEmpty) return; // Keep showing hardcoded data if no DB records

  const B = window.GS_BRIDGE;
  const goals = await B.invoke('get_goals', { store: B.STORE });
  const goalMap = {};
  if (goals) goals.forEach(g => { goalMap[g.metricKey] = g.value; });

  // Build CHART_DATA from raw records
  const dm = data.dailyMeans;
  const allSpPct = dm.map(d => d.meanSpPct);
  const allCust  = dm.map(d => d.meanCust);
  const allSpD   = dm.map(d => d.meanSpSales);
  const allSpN   = dm.map(d => d.meanSpQty);

  function buildChartObj(key, label, values, fmt) {
    const goalVal = goalMap[key] || 0;
    const mn = B.mean(values);
    const md = B.median(values);
    const minV = Math.min(...values);
    const maxV = Math.max(...values);
    const margin = (maxV - minV) * 0.15 || 0.5;
    const yMin = Math.floor((minV - margin) * 10) / 10;
    const yMax = Math.ceil((maxV + margin) * 10) / 10;
    const ticks = [];
    const step = (yMax - yMin) / 5;
    for (let i = 0; i <= 5; i++) {
      ticks.push((yMin + step * i).toFixed(fmt === 'pct' ? 2 : fmt === 'int' ? 0 : 1));
    }
    return {
      label, values, yMin, yMax, goalVal, meanVal: mn, medianVal: md,
      yFmt: fmt, yTicks: ticks.reverse(),
    };
  }

  CHART_DATA.period = {
    label: data.period.label,
    from: B.fmtDate(data.period.from),
    to: B.fmtDate(data.period.to),
    days: dm.length,
    records: data.records.length,
  };

  CHART_DATA.charts = {
    sp_pct: buildChartObj('sp_pct', 'SP %', allSpPct, 'pct'),
    cust:   buildChartObj('cust', 'Cust #', allCust, 'int'),
    sp_d:   buildChartObj('sp_d', 'SP $', allSpD, 'dollar'),
    sp_n:   buildChartObj('sp_n', 'SP #', allSpN, 'dec1'),
  };

  // Build summary cards from the data
  // (simplified — uses mean values and goal comparisons)
  const metrics = [
    { key: 'sp_pct', label: 'Store Mean SP %', medianLabel: 'Store Median SP %', values: allSpPct, fmt: v => v.toFixed(2) + '%' },
    { key: 'cust',   label: 'Store Mean Cust #', medianLabel: 'Store Median Cust #', values: allCust, fmt: v => Math.round(v).toString() },
    { key: 'sp_d',   label: 'Store Mean SP $', medianLabel: 'Store Median SP $', values: allSpD, fmt: v => '$' + Math.round(v) },
    { key: 'sp_n',   label: 'Store Mean SP #', medianLabel: 'Store Median SP #', values: allSpN, fmt: v => v.toFixed(1) },
  ];

  CHART_DATA.summary = metrics.map(m => {
    const mn = B.mean(m.values);
    const md = B.median(m.values);
    const goal = goalMap[m.key] || 0;
    return {
      label: m.label, medianLabel: m.medianLabel,
      value: m.fmt(mn), medianValue: m.fmt(md),
      trend: '+0.00', medianTrend: '+0.00', trendDir: 'up',
      goal: m.fmt(goal),
      goalMet: mn >= goal, medianGoalMet: md >= goal,
    };
  });

  renderAll();
};
